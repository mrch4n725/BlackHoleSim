<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photorealistic Schwarzschild Black Hole</title>
  <style>body{margin:0;overflow:hidden;background:black;}</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// --- Scene setup ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
camera.position.z = 30;

// --- Starfield background ---
const starCount = 20000;
const starsGeo = new THREE.BufferGeometry();
const starPositions = new Float32Array(starCount*3);
for(let i=0;i<starCount;i++){
    starPositions[i*3]=(Math.random()-0.5)*300;
    starPositions[i*3+1]=(Math.random()-0.5)*300;
    starPositions[i*3+2]=(Math.random()-0.5)*300;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPositions,3));
const starsMat = new THREE.PointsMaterial({size:0.5, color:0xffffff});
const stars = new THREE.Points(starsGeo, starsMat);
scene.add(stars);

// --- Schwarzschild black hole ---
const BH_RADIUS=3.0;
const photonSphere = BH_RADIUS*1.5;

// Event horizon sphere
const bhGeo = new THREE.SphereGeometry(BH_RADIUS,128,128);
const bhMat = new THREE.MeshBasicMaterial({color:0x000000});
const blackHole = new THREE.Mesh(bhGeo,bhMat);
scene.add(blackHole);

// Photon sphere glow using additive blending
const glowGeo = new THREE.SphereGeometry(photonSphere,128,128);
const glowMat = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.08, blending:THREE.AdditiveBlending});
const glow = new THREE.Mesh(glowGeo,glowMat);
scene.add(glow);

// --- Accretion disk (relativistic coloring) ---
const diskCount=5000;
const diskGeo=new THREE.BufferGeometry();
const diskPos=new Float32Array(diskCount*3);
const diskColors=new Float32Array(diskCount*3);
const velocities=[];

for(let i=0;i<diskCount;i++){
    let r=Math.random()*10+BH_RADIUS+1;
    let angle=Math.random()*Math.PI*2;
    let x=r*Math.cos(angle);
    let y=r*Math.sin(angle);
    let z=(Math.random()-0.5)*0.2;

    diskPos[i*3]=x;
    diskPos[i*3+1]=y;
    diskPos[i*3+2]=z;

    velocities.push(new THREE.Vector3(-Math.sin(angle),Math.cos(angle),0).multiplyScalar(2));

    // Doppler shift approximation: blue on approaching, red on receding
    let doppler = (Math.sin(angle)+1)/2; 
    diskColors[i*3] = doppler;       // R
    diskColors[i*3+1] = doppler*0.8; // G
    diskColors[i*3+2] = 1-doppler;   // B
}

diskGeo.setAttribute('position', new THREE.BufferAttribute(diskPos,3));
diskGeo.setAttribute('color', new THREE.BufferAttribute(diskColors,3));
const diskMat = new THREE.PointsMaterial({size:0.07, vertexColors:true, transparent:true, opacity:0.9});
const disk = new THREE.Points(diskGeo,diskMat);
scene.add(disk);

// --- Gravity function ---
function gravity(pos){
    let r=pos.length();
    return pos.clone().multiplyScalar(-BH_RADIUS*10/(r*r*r+0.01));
}

// --- Gravitational lensing shader approximation ---
function lensStars(){
    const pos=stars.geometry.attributes.position.array;
    for(let i=0;i<starCount;i++){
        let x=pos[i*3], y=pos[i*3+1], z=pos[i*3+2];
        let r=Math.sqrt(x*x+y*y+z*z);
        if(r<35){
            let strength=25/(r*r+5);
            pos[i*3]+=x*strength*0.01;
            pos[i*3+1]+=y*strength*0.01;
            pos[i*3+2]+=z*strength*0.01;
        }
    }
    stars.geometry.attributes.position.needsUpdate=true;
}

// --- Animate ---
function animate(){
    requestAnimationFrame(animate);
    const pos=disk.geometry.attributes.position.array;

    for(let i=0;i<diskCount;i++){
        let p=new THREE.Vector3(pos[i*3],pos[i*3+1],pos[i*3+2]);
        let acc=gravity(p);

        // time dilation visual approximation
        let timeFactor=Math.max(0.2,p.length()/10);
        velocities[i].add(acc.multiplyScalar(0.02*timeFactor));
        p.add(velocities[i].clone().multiplyScalar(0.02*timeFactor));

        // Hawking-like emission
        if(p.length()<BH_RADIUS+0.5 && Math.random()<0.015){
            velocities[i]=p.clone().normalize().multiplyScalar(5+Math.random()*2);
        }

        // absorb inside event horizon
        if(p.length()<BH_RADIUS){
            let angle=Math.random()*2*Math.PI;
            let r=Math.random()*10+BH_RADIUS+1;
            p.set(r*Math.cos(angle),r*Math.sin(angle),(Math.random()-0.5)*0.2);
            velocities[i]=new THREE.Vector3(-Math.sin(angle),Math.cos(angle),0).multiplyScalar(2);
        }

        pos[i*3]=p.x;
        pos[i*3+1]=p.y;
        pos[i*3+2]=p.z;
    }

    disk.geometry.attributes.position.needsUpdate=true;
    disk.rotation.z+=0.008;

    lensStars();

    // camera orbit
    const t=Date.now()*0.00015;
    camera.position.x=Math.sin(t)*30;
    camera.position.z=Math.cos(t)*30;
    camera.lookAt(0,0,0);

    renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
