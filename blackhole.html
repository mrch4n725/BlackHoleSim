<!DOCTYPE html>
<html>
<head>
  <title>Black Hole Simulation</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// Scene setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Black hole parameters
let BH_MASS = 30;
const EVENT_HORIZON = 2.5;

// Camera
camera.position.z = 30;

// Particle system
const particleCount = 2000;
const positions = new Float32Array(particleCount * 3);
const velocities = [];

// Initialize particles (accretion disk)
for (let i = 0; i < particleCount; i++) {
    let angle = Math.random() * Math.PI * 2;
    let radius = Math.random() * 15 + 5;

    let x = radius * Math.cos(angle);
    let y = radius * Math.sin(angle);
    let z = (Math.random() - 0.5) * 1;

    positions[i*3] = x;
    positions[i*3+1] = y;
    positions[i*3+2] = z;

    velocities.push(new THREE.Vector3(
        -Math.sin(angle),
        Math.cos(angle),
        0
    ).multiplyScalar(2));
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const material = new THREE.PointsMaterial({ size: 0.1, color: 0xffffff });
const particles = new THREE.Points(geometry, material);
scene.add(particles);

// Black hole sphere
const bhGeometry = new THREE.SphereGeometry(EVENT_HORIZON, 32, 32);
const bhMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
const blackHole = new THREE.Mesh(bhGeometry, bhMaterial);
scene.add(blackHole);

// Glow (fake lensing/accretion heat)
const glowMaterial = new THREE.MeshBasicMaterial({ color: 0xff8800, wireframe: true });
const glow = new THREE.Mesh(new THREE.SphereGeometry(EVENT_HORIZON*1.5, 32, 32), glowMaterial);
scene.add(glow);

// Physics
function gravity(pos) {
    let r = pos.length();
    let force = pos.clone().multiplyScalar(-BH_MASS / (r*r*r + 0.1));
    return force;
}

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    let pos = geometry.attributes.position.array;

    for (let i = 0; i < particleCount; i++) {

        let p = new THREE.Vector3(
            pos[i*3],
            pos[i*3+1],
            pos[i*3+2]
        );

        let acc = gravity(p);

        // Time dilation effect (slows motion near horizon)
        let timeFactor = Math.max(0.2, p.length() / 10);

        velocities[i].add(acc.multiplyScalar(0.02 * timeFactor));
        p.add(velocities[i].clone().multiplyScalar(0.02 * timeFactor));

        // Hawking radiation (emit particles outward near horizon)
        if (p.length() < EVENT_HORIZON + 0.5 && Math.random() < 0.02) {
            velocities[i] = p.clone().normalize().multiplyScalar(5 + Math.random()*2);
        }

        // Event horizon absorption
        if (p.length() < EVENT_HORIZON) {
            let angle = Math.random() * Math.PI * 2;
            let radius = Math.random() * 15 + 5;

            p.set(
                radius * Math.cos(angle),
                radius * Math.sin(angle),
                (Math.random() - 0.5)
            );

            velocities[i] = new THREE.Vector3(
                -Math.sin(angle),
                Math.cos(angle),
                0
            ).multiplyScalar(2);
        }

        pos[i*3] = p.x;
        pos[i*3+1] = p.y;
        pos[i*3+2] = p.z;
    }

    geometry.attributes.position.needsUpdate = true;

    // Rotate camera slowly
    camera.position.x = Math.sin(Date.now()*0.0002) * 30;
    camera.position.z = Math.cos(Date.now()*0.0002) * 30;
    camera.lookAt(0,0,0);

    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
